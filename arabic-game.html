<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arabic Word Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1a2e;
      --card: #16213e;
      --panel: #0f3460;
      --teal: #00b4d8;
      --teal-glow: rgba(0,180,216,0.18);
      --gold: #ffd60a;
      --green: #06d6a0;
      --red: #ef476f;
      --white: #f0f0f0;
      --muted: #8892a4;
      --border: #1e3a5f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    header .subtitle {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-family: 'Amiri', serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      color: var(--white);
      line-height: 1.1;
    }
    header h1 span { color: var(--gold); }

    /* ── SCORE BAR ── */
    .scorebar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .score-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 0.4rem 1.1rem;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .score-chip .label { color: var(--muted); }
    .score-chip .val { font-weight: 700; color: var(--teal); font-size: 1rem; }
    #lives-val { color: var(--red); }

    /* ── GAME MODES ── */
    .mode-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      background: var(--card);
      border-radius: 40px;
      padding: 0.3rem;
      border: 1px solid var(--border);
    }
    .mode-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--teal);
      color: #000;
    }

    /* ── MAIN CARD ── */
    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,180,216,0.07);
    }

    .prompt-label {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .prompt-word {
      font-family: 'Amiri', serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 0.3rem;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .prompt-word.english {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
    }

    .prompt-latin {
      font-size: 0.9rem;
      color: var(--teal);
      margin-bottom: 1.5rem;
      min-height: 1.4rem;
      font-style: italic;
    }

    /* ── CHOICES ── */
    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
      margin-bottom: 1rem;
    }
    .choice-btn {
      border: 1.5px solid var(--border);
      background: var(--panel);
      color: var(--white);
      font-family: 'Amiri', serif;
      font-size: 1.35rem;
      padding: 0.85rem 0.5rem;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.2;
    }
    .choice-btn.en-choice {
      font-family: 'Cairo', sans-serif;
      font-size: 0.92rem;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--teal);
      background: var(--teal-glow);
      transform: translateY(-2px);
    }
    .choice-btn.correct {
      background: rgba(6,214,160,0.18);
      border-color: var(--green);
      color: var(--green);
    }
    .choice-btn.wrong {
      background: rgba(239,71,111,0.15);
      border-color: var(--red);
      color: var(--red);
    }
    .choice-btn:disabled { cursor: default; transform: none; }

    /* ── FEEDBACK ── */
    .feedback {
      min-height: 1.6rem;
      font-size: 0.92rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      transition: opacity 0.2s;
    }
    .feedback.correct { color: var(--green); }
    .feedback.wrong   { color: var(--red); }

    /* ── NEXT BTN ── */
    #next-btn {
      display: none;
      background: var(--teal);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.7rem 2rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s;
    }
    #next-btn:hover { opacity: 0.85; }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      width: 100%;
      max-width: 520px;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── RESULT SCREEN ── */
    #result-screen {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 520px;
      padding: 2.5rem 1.5rem;
      text-align: center;
    }
    #result-screen .emoji { font-size: 3.5rem; margin-bottom: 0.75rem; }
    #result-screen h2 {
      font-family: 'Amiri', serif;
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 0.3rem;
    }
    #result-screen .score-big {
      font-size: 3rem;
      font-weight: 700;
      color: var(--teal);
      margin: 0.5rem 0;
    }
    #result-screen p { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
    #play-again {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.75rem 2rem;
      cursor: pointer;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: var(--muted);
    }

    @media (max-width: 400px) {
      .choices { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="subtitle">اللهجة الأردنية</div>
  <h1>Arabic <span>Word</span> Game</h1>
</header>

<!-- MODE SELECTOR -->
<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode('ar-en')" id="mode-ar-en">Arabic → English</button>
  <button class="mode-btn" onclick="setMode('en-ar')" id="mode-en-ar">English → Arabic</button>
</div>

<!-- SCORE BAR -->
<div class="scorebar">
  <div class="score-chip"><span class="label">Score</span><span class="val" id="score-val">0</span></div>
  <div class="score-chip"><span class="label">Question</span><span class="val" id="q-val">1 / 15</span></div>
  <div class="score-chip"><span class="label">Lives</span><span class="val" id="lives-val">❤️❤️❤️</span></div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<!-- GAME CARD -->
<div class="game-card" id="game-card">
  <div class="prompt-label" id="prompt-label">What does this mean?</div>
  <div class="prompt-word" id="prompt-word">زار</div>
  <div class="prompt-latin" id="prompt-latin">zār</div>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button id="next-btn" onclick="nextQuestion()">Next →</button>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="emoji" id="res-emoji">🌟</div>
  <h2 id="res-title">Excellent!</h2>
  <div class="score-big" id="res-score">12 / 15</div>
  <p id="res-msg">You really know your Jordanian verbs!</p>
  <button id="play-again" onclick="startGame()">Play Again ↺</button>
</div>

<footer>Done by Khadija Ghanim</footer>

<script>
  const WORDS = [
    { ar: 'زار',    lat: 'zār',       en: 'to visit' },
    { ar: 'باع',    lat: 'bāʿ',       en: 'to sell' },
    { ar: 'قام',    lat: 'qām',       en: 'to stand / get up' },
    { ar: 'نام',    lat: 'nām',       en: 'to sleep' },
    { ar: 'شاف',    lat: 'shāf',      en: 'to see' },
    { ar: 'حكى',    lat: 'haka',      en: 'to talk' },
    { ar: 'نمّ',     lat: 'naam',      en: 'to gossip' },
    { ar: 'بلّش',   lat: 'bellash',   en: 'to start' },
    { ar: 'طبّخ',   lat: 'tabakh',    en: 'to cook' },
    { ar: 'كتب',    lat: 'katab',     en: 'to write' },
    { ar: 'قرأ',    lat: 'qaraa',     en: 'to read' },
    { ar: 'لعب',    lat: 'laʿib',     en: 'to play' },
    { ar: 'حضر',    lat: 'hidir',     en: 'to watch' },
    { ar: 'استنى',  lat: 'istana',    en: 'to wait (m.)' },
    { ar: 'هون',    lat: 'hon',       en: 'here' },
    { ar: 'هناك',   lat: 'honāk',     en: 'there' },
    { ar: 'مع',     lat: 'maʿ',       en: 'with' },
    { ar: 'بشوفك',  lat: 'bashofak',  en: 'see you' },
  ];

  let mode = 'ar-en';
  let queue = [];
  let current = 0;
  let score = 0;
  let lives = 3;
  let answered = false;
  const TOTAL = 15;

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + m).classList.add('active');
    startGame();
  }

  function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
  }

  function startGame() {
    score = 0; lives = 3; current = 0; answered = false;
    queue = shuffle(WORDS).slice(0, TOTAL);
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-card').style.display = 'block';
    renderQuestion();
  }

  function renderQuestion() {
    if (current >= TOTAL || lives <= 0) { showResult(); return; }

    answered = false;
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    const word = queue[current];
    const isArEn = mode === 'ar-en';

    // prompt
    const promptEl = document.getElementById('prompt-word');
    if (isArEn) {
      promptEl.textContent = word.ar;
      promptEl.className = 'prompt-word';
      document.getElementById('prompt-latin').textContent = word.lat;
      document.getElementById('prompt-label').textContent = 'What does this mean?';
    } else {
      promptEl.textContent = word.en;
      promptEl.className = 'prompt-word english';
      document.getElementById('prompt-latin').textContent = '';
      document.getElementById('prompt-label').textContent = 'Pick the Arabic word:';
    }

    // choices: 1 correct + 3 wrong
    const others = WORDS.filter(w => w.ar !== word.ar);
    const distractors = shuffle(others).slice(0, 3);
    const choices = shuffle([word, ...distractors]);

    const container = document.getElementById('choices');
    container.innerHTML = '';
    choices.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (isArEn ? '' : ' en-choice');
      btn.textContent = isArEn ? ch.en : ch.ar;
      if (!isArEn && ch.ar !== ch.en) {
        // show latin under arabic
        btn.innerHTML = `<span style="display:block">${ch.ar}</span><span style="font-family:'Cairo',sans-serif;font-size:0.7rem;color:#8892a4">${ch.lat}</span>`;
      }
      btn.onclick = () => checkAnswer(btn, ch.ar === word.ar);
      container.appendChild(btn);
    });

    // update hud
    document.getElementById('score-val').textContent = score;
    document.getElementById('q-val').textContent = (current + 1) + ' / ' + TOTAL;
    document.getElementById('lives-val').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
    document.getElementById('progress').style.width = (current / TOTAL * 100) + '%';
  }

  function checkAnswer(btn, isCorrect) {
    if (answered) return;
    answered = true;

    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => b.disabled = true);

    // highlight correct
    const word = queue[current];
    const isArEn = mode === 'ar-en';
    btns.forEach(b => {
      const text = b.querySelector('span') ? b.querySelector('span').textContent : b.textContent;
      const match = isArEn ? text === word.en : text === word.ar;
      if (match) b.classList.add('correct');
    });

    const fb = document.getElementById('feedback');
    if (isCorrect) {
      score++;
      btn.classList.add('correct');
      fb.textContent = '✅ Correct! ' + word.ar + ' = ' + word.en;
      fb.className = 'feedback correct';
    } else {
      btn.classList.add('wrong');
      lives--;
      fb.textContent = '❌ ' + word.ar + ' (' + word.lat + ') = ' + word.en;
      fb.className = 'feedback wrong';
    }

    document.getElementById('lives-val').textContent = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);

    if (lives <= 0) {
      setTimeout(showResult, 1200);
    } else {
      document.getElementById('next-btn').style.display = 'inline-block';
    }
  }

  function nextQuestion() {
    current++;
    renderQuestion();
  }

  function showResult() {
    document.getElementById('game-card').style.display = 'none';
    const rs = document.getElementById('result-screen');
    rs.style.display = 'block';

    const pct = score / TOTAL;
    let emoji, title, msg;
    if (pct === 1)       { emoji = '🌟'; title = 'Perfect!';      msg = 'You really know your Jordanian verbs! ممتاز!'; }
    else if (pct >= 0.8) { emoji = '😊'; title = 'Great job!';    msg = 'Almost perfect – keep it up! أحسنت!'; }
    else if (pct >= 0.6) { emoji = '🙂'; title = 'Good try!';     msg = 'Review the verbs and play again! كمّل!'; }
    else                 { emoji = '📚'; title = 'Keep studying!'; msg = 'Go over the lesson and try again. راجع الدرس!'; }

    document.getElementById('res-emoji').textContent = emoji;
    document.getElementById('res-title').textContent = title;
    document.getElementById('res-score').textContent = score + ' / ' + TOTAL;
    document.getElementById('res-msg').textContent = msg;
    document.getElementById('progress').style.width = '100%';
  }

  // start on load
  startGame();
</script>
</body>
</html>
